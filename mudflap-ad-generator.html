<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudflap Ad Visual Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --mf-navy: #0432BA; --mf-deep-navy: #021E70; --mf-darkest: #000854;
    --mf-green: #00BA7F; --mf-green-dark: #00885D; --mf-green-darkest: #002218;
    --mf-orange: #FE9738; --mf-blue-mid: #4878FF; --mf-night: #02152A;
    --mf-light-blue: #EAF4FF; --mf-border: rgba(0,0,0,0.1); --mf-border-hover: rgba(0,0,0,0.2);
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  }
  body { font-family: 'Open Sans', sans-serif; background: #F5F8FC; color: #02152A; min-height: 100vh; }

  header {
    background: var(--mf-deep-navy); padding: 0 2rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header-logo { display: flex; align-items: center; gap: 9px; }
  .header-logo svg { width: 28px; height: 28px; }
  .header-logo span { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: 0.02em; }
  .header-tag { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 400; margin-left: 4px; }

  .main { display: flex; gap: 0; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; align-items: flex-start; }

  .controls { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
  .card { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--mf-border); padding: 18px; }
  .card-title { font-size: 11px; font-weight: 700; color: #78909C; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

  textarea#prompt {
    width: 100%; min-height: 80px; resize: vertical;
    font-family: 'Open Sans', sans-serif; font-size: 13px; line-height: 1.6;
    padding: 10px 12px; border: 1px solid var(--mf-border-hover);
    border-radius: var(--radius-sm); color: var(--mf-night); background: #F5F8FC; outline: none;
  }
  textarea#prompt:focus { border-color: var(--mf-navy); background: #fff; }
  textarea#prompt::placeholder { color: #B0BEC5; }

  .chip-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    padding: 5px 11px; font-size: 12px; font-weight: 600; border-radius: 20px;
    border: 1px solid var(--mf-border-hover); background: transparent; color: #546E7A;
    cursor: pointer; font-family: 'Open Sans', sans-serif; transition: all 0.12s;
  }
  .chip:hover { border-color: var(--mf-navy); color: var(--mf-navy); }
  .chip.active { background: var(--mf-light-blue); color: var(--mf-navy); border-color: var(--mf-blue-mid); }

  .pal-row { display: flex; gap: 9px; align-items: center; flex-wrap: wrap; }
  .pal-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.12s; }
  .pal-swatch.active { border-color: var(--mf-night); transform: scale(1.18); }

  .gen-btn {
    width: 100%; padding: 11px; background: var(--mf-navy); color: #fff;
    border: none; border-radius: var(--radius-md);
    font-family: 'Open Sans', sans-serif; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: background 0.15s;
  }
  .gen-btn:hover { background: var(--mf-deep-navy); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .canvas-area { flex: 1; margin-left: 24px; }
  .size-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .size-btn {
    padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: var(--radius-sm);
    border: 1px solid var(--mf-border-hover); background: #fff; color: #546E7A;
    cursor: pointer; font-family: 'Open Sans', sans-serif; transition: all 0.12s;
  }
  .size-btn.active { background: var(--mf-deep-navy); color: #fff; border-color: var(--mf-deep-navy); }
  .size-label { font-size: 11px; color: #B0BEC5; margin-left: 6px; }

  .canvas-wrap {
    background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--mf-border);
    padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 14px;
    min-height: 400px; justify-content: center;
  }
  canvas#adCanvas { border-radius: 10px; display: block; max-width: 100%; max-height: 420px; box-shadow: 0 4px 24px rgba(4,50,186,0.12); }
  .canvas-footer { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-top: 4px; }
  .status-msg { font-size: 12px; color: #78909C; }
  .dl-btn {
    padding: 8px 18px; font-size: 12px; font-weight: 700; border-radius: var(--radius-sm);
    border: 1px solid var(--mf-border-hover); background: #fff; color: var(--mf-night);
    cursor: pointer; font-family: 'Open Sans', sans-serif; transition: all 0.12s;
  }
  .dl-btn:hover { background: var(--mf-deep-navy); color: #fff; border-color: var(--mf-deep-navy); }

  @media (max-width: 780px) {
    .main { flex-direction: column; }
    .controls { width: 100%; }
    .canvas-area { margin-left: 0; margin-top: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <svg viewBox="0 0 28 28" fill="none">
      <polygon points="14,1 27,14 14,27 1,14" fill="#00BA7F" stroke="#fff" stroke-width="1.5"/>
      <text x="14" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="sans-serif">⚡</text>
    </svg>
    <span>MUDFLAP <span class="header-tag">Ad Generator</span></span>
  </div>
</header>

<div class="main">
  <div class="controls">
    <div class="card">
      <div class="card-title">Describe your ad</div>
      <textarea id="prompt" placeholder="e.g. Diesel savings promo — 15 ¢/gal off at 3,600+ stops, targeting fleet managers with 5+ trucks"></textarea>
    </div>
    <div class="card">
      <div class="card-title">Funnel stage</div>
      <div class="chip-group" id="stageChips">
        <button class="chip active" data-v="Awareness">Awareness</button>
        <button class="chip" data-v="Consideration">Consideration</button>
        <button class="chip" data-v="Conversion">Conversion</button>
        <button class="chip" data-v="Retargeting">Retargeting</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Layout style</div>
      <div class="chip-group" id="layoutChips">
        <button class="chip active" data-v="bold">Bold</button>
        <button class="chip" data-v="clean">Clean</button>
        <button class="chip" data-v="stat-forward">Stat-forward</button>
        <button class="chip" data-v="minimal">Minimal</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Color palette</div>
      <div class="pal-row" id="palRow">
        <div class="pal-swatch active" data-p="navy"      style="background:#0432BA" title="Mudflap Navy"></div>
        <div class="pal-swatch"        data-p="deep-navy" style="background:#021E70" title="Deep Navy"></div>
        <div class="pal-swatch"        data-p="night"     style="background:#02152A" title="Night Dark"></div>
        <div class="pal-swatch"        data-p="green"     style="background:#00885D" title="Mudflap Green"></div>
        <div class="pal-swatch"        data-p="orange"    style="background:#FE9738" title="Orange"></div>
      </div>
    </div>
    <button class="gen-btn" id="genBtn" onclick="generate()">Generate visual →</button>
  </div>

  <div class="canvas-area">
    <div class="size-bar">
      <button class="size-btn active" onclick="setSize('square',this)">Square 1:1</button>
      <button class="size-btn" onclick="setSize('story',this)">Story 9:16</button>
      <button class="size-btn" onclick="setSize('landscape',this)">Landscape 1.91:1</button>
      <span class="size-label" id="sizeLabel">1080 × 1080</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="adCanvas"></canvas>
      <div class="canvas-footer">
        <span class="status-msg" id="statusMsg">Choose your settings and generate</span>
        <button class="dl-btn" onclick="download()">Download PNG</button>
      </div>
    </div>
  </div>
</div>

<script>
let curSize='square', curPal='navy', curStage='Awareness', curLayout='bold', lastSpec=null;

const SIZES = {
  square:    { w:1080, h:1080, display:{w:400,h:400}, label:'1080 × 1080' },
  story:     { w:1080, h:1920, display:{w:225,h:400}, label:'1080 × 1920' },
  landscape: { w:1200, h:628,  display:{w:400,h:209}, label:'1200 × 628'  },
};
const PALETTES = {
  'navy':      { bg:'#0432BA', bg2:'#021E70', text:'#FFFFFF', accent:'#00BA7F', accentText:'#002218', sub:'rgba(255,255,255,0.72)', ctaBg:'#00BA7F', ctaText:'#002218' },
  'deep-navy': { bg:'#021E70', bg2:'#000854', text:'#FFFFFF', accent:'#FE9738', accentText:'#02152A', sub:'rgba(255,255,255,0.68)', ctaBg:'#FE9738', ctaText:'#02152A' },
  'night':     { bg:'#02152A', bg2:'#000',    text:'#FFFFFF', accent:'#00BA7F', accentText:'#002218', sub:'rgba(255,255,255,0.65)', ctaBg:'#00BA7F', ctaText:'#002218' },
  'green':     { bg:'#00885D', bg2:'#002218', text:'#FFFFFF', accent:'#4878FF', accentText:'#fff',    sub:'rgba(255,255,255,0.72)', ctaBg:'#4878FF', ctaText:'#fff'    },
  'orange':    { bg:'#FE9738', bg2:'#CC8B00', text:'#02152A', accent:'#0432BA', accentText:'#fff',    sub:'rgba(2,21,42,0.62)',    ctaBg:'#0432BA', ctaText:'#fff'    },
};

const canvas = document.getElementById('adCanvas');
const ctx = canvas.getContext('2d');

window.addEventListener('DOMContentLoaded', () => {
  setupChips('stageChips', v => curStage = v);
  setupChips('layoutChips', v => curLayout = v);
  document.querySelectorAll('.pal-swatch').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.pal-swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active'); curPal = s.dataset.p;
      if (lastSpec) render(lastSpec); else drawPlaceholder();
    });
  });
  drawPlaceholder();
});

function setupChips(id, cb) {
  document.getElementById(id).querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      c.closest('.chip-group').querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active'); cb(c.dataset.v);
    });
  });
}

function setSize(s, btn) {
  curSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sizeLabel').textContent = SIZES[s].label;
  if (lastSpec) render(lastSpec); else drawPlaceholder();
}

function setCanvasSize() {
  const d = SIZES[curSize].display;
  canvas.width  = SIZES[curSize].w; canvas.height = SIZES[curSize].h;
  canvas.style.width = d.w+'px';   canvas.style.height = d.h+'px';
}

function drawPlaceholder() {
  setCanvasSize();
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#0432BA'; ctx.fillRect(0,0,W,H);
  drawBg(W,H,'#021E70'); drawLogoMark(W,H);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font=`600 ${Math.round(W*0.032)}px Open Sans,sans-serif`;
  ctx.textAlign='center';
  ctx.fillText('Choose settings and generate', W/2, H/2);
}

function drawBg(W,H,col) {
  ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(W*0.52,0); ctx.lineTo(W,0); ctx.lineTo(W,H); ctx.lineTo(W*0.28,H); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=0.1; ctx.fillStyle='#fff';
  const cx=W*0.82, cy=H*0.16, ds=W*0.18;
  ctx.beginPath(); ctx.moveTo(cx,cy-ds); ctx.lineTo(cx+ds*0.7,cy); ctx.lineTo(cx,cy+ds); ctx.lineTo(cx-ds*0.7,cy); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawLogoMark(W,H) {
  const x=W*0.06, y=H*0.055, ds=W*0.042;
  ctx.save();
  ctx.fillStyle='#00BA7F'; ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=ds*0.1;
  ctx.beginPath(); ctx.moveTo(x+ds/2,y); ctx.lineTo(x+ds,y+ds/2); ctx.lineTo(x+ds/2,y+ds); ctx.lineTo(x,y+ds/2); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(ds*0.6)}px sans-serif`; ctx.textAlign='center';
  ctx.fillText('⚡', x+ds/2, y+ds*0.72);
  ctx.fillStyle='#fff'; ctx.font=`800 ${Math.round(ds*0.82)}px Open Sans,sans-serif`; ctx.textAlign='left';
  ctx.fillText('MUDFLAP', x+ds*1.3, y+ds*0.76);
  ctx.restore();
}

function wrapText(ctx,text,x,y,maxW,lh) {
  if(!text) return 0;
  const words=text.split(' '); let line='', lines=[];
  for(const w of words) {
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}else line=test;
  }
  if(line) lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lh));
  return lines.length;
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function render(spec) {
  setCanvasSize();
  const W=canvas.width, H=canvas.height, p=PALETTES[curPal], pad=W*0.08;
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);
  drawBg(W,H,p.bg2); drawLogoMark(W,H);

  const isLandscape=curSize==='landscape';
  const headSize=Math.round(W*(isLandscape?0.075:curLayout==='stat-forward'?0.1:0.09));
  const subSize=Math.round(headSize*0.52);
  let headY=H*0.14+H*0.04;

  if(spec.stat&&curLayout==='stat-forward') {
    const ss=Math.round(H*0.2);
    ctx.fillStyle=p.accent; ctx.font=`800 ${ss}px Open Sans,sans-serif`; ctx.textAlign='center';
    ctx.fillText(spec.stat,W/2,H*0.5);
    if(spec.statLabel){ ctx.fillStyle=p.sub; ctx.font=`400 ${Math.round(ss*0.28)}px Open Sans,sans-serif`; ctx.fillText(spec.statLabel,W/2,H*0.5+ss*0.38); }
    headY=H*0.14+headSize*0.3;
  }

  ctx.fillStyle=p.text; ctx.font=`700 ${headSize}px Open Sans,sans-serif`; ctx.textAlign='left';
  const hl=wrapText(ctx,spec.headline||'',pad,headY+headSize,W-pad*1.7,headSize*1.2);

  const subY=headY+headSize+hl*headSize*1.2+H*0.016;
  ctx.fillStyle=p.sub; ctx.font=`400 ${subSize}px Open Sans,sans-serif`;
  wrapText(ctx,spec.subheadline||'',pad,subY+subSize,W-pad*1.7,subSize*1.4);

  if(spec.savings) {
    const bh=H*0.09,bw=bh*2.4,bx=W-pad*0.6-bw,by=H*0.055;
    ctx.fillStyle=p.accent; ctx.beginPath(); roundRect(ctx,bx,by,bw,bh,6); ctx.fill();
    ctx.fillStyle=p.accentText; ctx.font=`700 ${Math.round(bh*0.36)}px Open Sans,sans-serif`; ctx.textAlign='center';
    ctx.fillText(spec.savings,bx+bw/2,by+bh*0.66);
  }

  if(spec.cta) {
    const ctaH=H*0.094,ctaW=Math.min(W*0.58,W-pad*2),ctaX=pad,ctaY=H-ctaH-H*0.075;
    ctx.fillStyle=p.ctaBg; ctx.beginPath(); roundRect(ctx,ctaX,ctaY,ctaW,ctaH,7); ctx.fill();
    ctx.fillStyle=p.ctaText; ctx.font=`700 ${Math.round(ctaH*0.41)}px Open Sans,sans-serif`; ctx.textAlign='center';
    ctx.fillText(spec.cta,ctaX+ctaW/2,ctaY+ctaH*0.67);
  }

  if(spec.proof) {
    const ph=H*0.072,pw=W*0.44,px=W-pad*0.6-pw,py=H-ph-H*0.072;
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.beginPath(); roundRect(ctx,px,py,pw,ph,5); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font=`400 ${Math.round(ph*0.35)}px Open Sans,sans-serif`; ctx.textAlign='center';
    ctx.fillText(spec.proof,px+pw/2,py+ph*0.65);
  }
}

async function generate() {
  const prompt=document.getElementById('prompt').value.trim();
  if(!prompt){setStatus('Add a description first.');return;}
  const btn=document.getElementById('genBtn');
  btn.disabled=true; btn.textContent='Generating...'; setStatus('Generating...');
  try {
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,stage:curStage,layout:curLayout})
    });
    if(!res.ok){const e=await res.json();throw new Error(JSON.stringify(e));}
    const spec=await res.json();
    lastSpec=spec; render(spec);
    setStatus(SIZES[curSize].label+' · Ready to download');
  } catch(e){
    setStatus('Something went wrong — try again.');
    console.error(e);
  }
  btn.disabled=false; btn.textContent='Generate visual →';
}

function download() {
  if(!lastSpec){setStatus('Generate an ad first.');return;}
  const a=document.createElement('a');
  a.download=`mudflap-ad-${curSize}-${Date.now()}.png`;
  a.href=canvas.toDataURL('image/png'); a.click();
}

function setStatus(m){document.getElementById('statusMsg').textContent=m;}
</script>
</body>
</html>
